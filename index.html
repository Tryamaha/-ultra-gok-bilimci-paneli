<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>UltraTelescope Clean Camera</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
#app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
}
video,canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
}
video{z-index:1}
canvas{z-index:2;pointer-events:none}

#shutter{
  position:absolute;
  left:50%;
  bottom:calc(env(safe-area-inset-bottom) + 34px);
  transform:translateX(-50%);
  z-index:20;
  width:86px;
  height:86px;
  border-radius:50%;
  border:5px solid rgba(255,255,255,.95);
  background:rgba(255,255,255,.88);
  box-shadow:0 0 0 8px rgba(255,255,255,.25);
}

#drawer{
  position:absolute;
  left:12px;
  right:12px;
  bottom:-360px;
  height:340px;
  z-index:40;
  background:rgba(0,0,0,.78);
  color:#fff;
  border-radius:26px 26px 0 0;
  padding:18px;
  backdrop-filter:blur(18px);
  transition:.25s ease;
}
#drawer.open{bottom:0}
#handle{
  width:70px;
  height:6px;
  border-radius:20px;
  background:#777;
  margin:0 auto 18px;
}
.row{
  display:grid;
  grid-template-columns:110px 1fr 58px;
  gap:12px;
  align-items:center;
  margin:14px 0;
}
.row b{color:#66f7ff;text-align:right}
input[type=range]{width:100%;accent-color:#66f7ff}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:16px;
}
.grid button{
  height:48px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-weight:900;
}
#msg{
  position:absolute;
  left:20px;
  right:20px;
  top:45%;
  z-index:60;
  background:rgba(0,0,0,.82);
  color:#fff;
  padding:18px;
  border-radius:18px;
  text-align:center;
  display:none;
}
</style>
</head>

<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <button id="shutter" onclick="takePhoto()"></button>

  <div id="msg">Kamera açılamadı. Safari site ayarlarından kamera iznini aç.</div>

  <div id="drawer">
    <div id="handle"></div>

    <div class="row">
      <span>Zoom</span>
      <input id="zoomRange" type="range" min="1" max="200" value="1">
      <b id="zoomText">1x</b>
    </div>

    <div class="row">
      <span>Kontrast</span>
      <input id="contrastRange" type="range" min="50" max="220" value="110">
      <b id="contrastText">110%</b>
    </div>

    <div class="row">
      <span>Parlaklık</span>
      <input id="brightRange" type="range" min="50" max="180" value="100">
      <b id="brightText">100%</b>
    </div>

    <div class="row">
      <span>Netlik</span>
      <input id="sharpRange" type="range" min="0" max="100" value="35">
      <b id="sharpText">35%</b>
    </div>

    <div class="grid">
      <button onclick="setMode('normal')">Renkli</button>
      <button onclick="setMode('bw')">Siyah Beyaz</button>
      <button onclick="setMode('night')">Gece</button>
      <button onclick="setMode('thermal')">Termal Sim</button>
    </div>
  </div>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d",{willReadFrequently:true});

let zoom=1;
let contrast=110;
let brightness=100;
let sharpness=35;
let mode="normal";
let lastTap=0;

document.body.addEventListener("touchend",()=>{
  const now=Date.now();
  if(now-lastTap<320){
    document.getElementById("drawer").classList.toggle("open");
  }
  lastTap=now;
});

zoomRange.oninput=e=>{
  zoom=Number(e.target.value);
  zoomText.textContent=zoom+"x";
};

contrastRange.oninput=e=>{
  contrast=Number(e.target.value);
  contrastText.textContent=contrast+"%";
};

brightRange.oninput=e=>{
  brightness=Number(e.target.value);
  brightText.textContent=brightness+"%";
};

sharpRange.oninput=e=>{
  sharpness=Number(e.target.value);
  sharpText.textContent=sharpness+"%";
};

function setMode(m){
  mode=m;
  document.getElementById("drawer").classList.remove("open");
}

async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1920},
        height:{ideal:1080}
      },
      audio:false
    });

    video.srcObject=stream;
    await video.play();
    requestAnimationFrame(draw);

  }catch(e){
    msg.style.display="block";
  }
}

function draw(){
  if(video.videoWidth){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    const realZoom=Math.min(zoom,60);
    const sw=canvas.width/realZoom;
    const sh=canvas.height/realZoom;
    const sx=(canvas.width-sw)/2;
    const sy=(canvas.height-sh)/2;

    ctx.drawImage(video,sx,sy,sw,sh,0,0,canvas.width,canvas.height);

    let img=ctx.getImageData(0,0,canvas.width,canvas.height);
    let d=img.data;

    const br=brightness/100;
    const ct=contrast/100;

    for(let i=0;i<d.length;i+=4){
      let r=d[i];
      let g=d[i+1];
      let b=d[i+2];
      let lum=(r+g+b)/3;

      if(mode==="bw"){
        let v=(lum*br-128)*ct+128;
        d[i]=d[i+1]=d[i+2]=clamp(v);
      }
      else if(mode==="night"){
        let v=(lum*br-128)*ct+128;
        d[i]=clamp(v*.15);
        d[i+1]=clamp(v*1.35);
        d[i+2]=clamp(v*.25);
      }
      else if(mode==="thermal"){
        d[i]=clamp(lum*1.7*br);
        d[i+1]=clamp(lum*.85*br);
        d[i+2]=clamp(255-lum);
      }
      else{
        d[i]=clamp((r*br-128)*ct+128);
        d[i+1]=clamp((g*br-128)*ct+128);
        d[i+2]=clamp((b*br-128)*ct+128);
      }
    }

    ctx.putImageData(img,0,0);

    if(sharpness>0){
      sharpen(sharpness/100);
    }
  }

  requestAnimationFrame(draw);
}

function sharpen(amount){
  const w=canvas.width;
  const h=canvas.height;
  const img=ctx.getImageData(0,0,w,h);
  const d=img.data;
  const copy=new Uint8ClampedArray(d);

  for(let y=1;y<h-1;y+=2){
    for(let x=1;x<w-1;x+=2){
      const i=(y*w+x)*4;

      for(let c=0;c<3;c++){
        const center=copy[i+c]*5;
        const around=
          copy[i-4+c]+
          copy[i+4+c]+
          copy[i-w*4+c]+
          copy[i+w*4+c];

        d[i+c]=clamp(copy[i+c]+(center-around)*0.12*amount);
      }
    }
  }

  ctx.putImageData(img,0,0);
}

function clamp(v){
  return Math.max(0,Math.min(255,v));
}

function takePhoto(){
  const a=document.createElement("a");
  a.download="UltraTelescope-Camera.png";
  a.href=canvas.toDataURL("image/png");
  a.click();
}

startCamera();
</script>
</body>
</html>
